<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doser Secret Panel | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }
        .admin-login-container h2 {
            margin-bottom: 20px;
            font-weight: 700;
        }
        .admin-input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            outline: none;
        }
        .admin-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--primary-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-standard);
        }
        .admin-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .dashboard-container {
            display: none;
            max-width: 900px;
            margin: 50px auto;
            text-align: right;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .link-manager {
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }
        .delete-btn {
            background: #ff4d4f;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
        .add-link-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .admin-nav {
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
    </style>
</head>
<body>
    
    <div id="login-section" class="admin-login-container">
        <h2>تسجيل الدخول <i class="fas fa-lock"></i></h2>
        <input type="email" id="email" class="admin-input" placeholder="البريد الإلكتروني" value="admin@doser.hub">
        <input type="password" id="password" class="admin-input" placeholder="كلمة المرور">
        <button id="login-btn" class="admin-btn">دخول</button>
        <p id="login-error" style="color: #ff4d4f; margin-top: 10px; display: none;"></p>
    </div>

    <div id="dashboard" class="dashboard-container">
        <div class="dashboard-header">
            <h1>لوحة التحكم الذكية <i class="fas fa-shield-halved"></i></h1>
            <button id="logout-btn" class="delete-btn">تسجيل خروج</button>
        </div>

        <div class="link-manager">
            <h3>إدارة الروابط والمنصات <i class="fas fa-link"></i></h3>
            <button id="seed-btn" class="admin-btn" style="background: var(--accent-color); margin-bottom: 15px;">استعادة المواقع الافتراضية <i class="fas fa-magic"></i></button>
            <div id="current-links" class="link-list">
                <!-- روابط من Firestore -->
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">

            <h4>إضافة موقع جديد</h4>
            <div class="add-link-form">
                <input type="text" id="site-name" class="admin-input" placeholder="اسم الموقع (مثال: فيسبوك)">
                <input type="text" id="site-url" class="admin-input" placeholder="رابط الموقع (https://...)">
                <input type="text" id="site-icon" class="admin-input" placeholder="أيقونة FA (مثال: fab fa-facebook)">
                <input type="text" id="site-order" class="admin-input" placeholder="الترتيب (رقم)">
                <input type="text" id="site-color" class="admin-input" placeholder="اللون (مثال: linear-gradient(135deg, #1877F2, #000))">
                <button id="add-site-btn" class="admin-btn" style="grid-column: span 2;">إضافة الموقع</button>
            </div>
        </div>

        <div class="link-manager">
            <h3>تغيير كلمة المرور <i class="fas fa-key"></i></h3>
            <input type="password" id="new-password" class="admin-input" placeholder="كلمة المرور الجديدة">
            <button id="change-pass-btn" class="admin-btn">تحديث كلمة المرور</button>
        </div>
        
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: var(--primary-color);">العودة للرئيسية</a>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
